[build]
builder = "nixpacks"
buildCommand = "npm ci && cd src/backend && npx prisma generate --schema=prisma/schema.prisma && npx prisma generate --schema=prisma/master.prisma && npm run build"

[deploy]
startCommand = "cd src/backend && npx prisma migrate deploy --schema=prisma/master.prisma && npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
