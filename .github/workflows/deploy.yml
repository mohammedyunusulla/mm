name: CI — Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

# Railway auto-deploys from GitHub on push to main.
# Vercel auto-deploys from GitHub on push to main.
# This workflow only builds & verifies the code compiles cleanly.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        working-directory: src/backend
        run: npx prisma generate --schema=prisma/schema.prisma && npx prisma generate --schema=prisma/master.prisma

      - name: Build backend
        run: npm run build --workspace=src/backend

      - name: Build frontend
        run: npm run build:web
        env:
          NEXT_PUBLIC_USE_MOCK: "false"
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'http://localhost:4000' }}
